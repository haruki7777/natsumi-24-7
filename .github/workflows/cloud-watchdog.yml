name: Cloud deployment watchdog

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Protect lightweight sync files
        id: protect
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main

          workflow_file=".github/workflows/sync-lite-repo.yml"
          sync_files=(
            "scripts/build-lite-repo.mjs"
            "docs/free-bot-hosting.md"
            "docs/two-bot-setup.md"
          )

          if ! git cat-file -e "HEAD:${workflow_file}" 2>/dev/null; then
            echo "${workflow_file} is missing. Cloud watchdog will sync the lite repo directly."
          fi

          missing=()
          for file in "${sync_files[@]}"; do
            if ! git cat-file -e "HEAD:${file}" 2>/dev/null; then
              missing+=("${file}")
            fi
          done

          if ! git cat-file -e "HEAD:bot.ts" 2>/dev/null; then
            echo "bot.ts is missing; refusing automatic restore." >&2
            exit 1
          fi

          restored=0
          if [ "${#missing[@]}" -gt 0 ]; then
            candidates=("origin/main~1" "3d301b7" "f7126aa" "8d18a39")
            for file in "${missing[@]}"; do
              recovered=0
              for candidate in "${candidates[@]}"; do
                if git cat-file -e "${candidate}:${file}" 2>/dev/null; then
                  git checkout "${candidate}" -- "${file}"
                  recovered=1
                  restored=1
                  break
                fi
              done
              if [ "${recovered}" -ne 1 ]; then
                echo "Could not restore ${file}" >&2
                exit 1
              fi
            done
          fi

          if [ "${restored}" -eq 1 ]; then
            node --check scripts/build-lite-repo.mjs
            git diff --check
            rm -rf ../lite-automation-check
            node scripts/build-lite-repo.mjs ../lite-automation-check
            test -f ../lite-automation-check/package.json
            test -f ../lite-automation-check/bot.ts
            test -d ../lite-automation-check/commands
            test -d ../lite-automation-check/utils
            test -f ../lite-automation-check/README.md
            rm -rf ../lite-automation-check

            git config user.name "natsumi-cloud-watchdog"
            git config user.email "actions@github.com"
            git add "${sync_files[@]}"
            git commit -m "Restore lightweight sync files"
            git push origin HEAD:main
          fi

          echo "restored=${restored}" >> "$GITHUB_OUTPUT"

      - name: Check lightweight repository sync
        id: lite
        env:
          GH_TOKEN: ${{ github.token }}
          LITE_REPO_DEPLOY_KEY: ${{ secrets.LITE_REPO_DEPLOY_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main
          source_sha="$(git rev-parse origin/main)"
          source_short="${source_sha:0:7}"
          current_lite_sha=""
          current_lite_msg=""
          reflected=0

          for attempt in {1..7}; do
            current_lite_sha="$(gh api repos/haruki7777/natsumi-bot-24-7/commits/main --jq .sha)"
            current_lite_msg="$(gh api repos/haruki7777/natsumi-bot-24-7/commits/main --jq .commit.message)"
            if [[ "${current_lite_msg}" == *"sync: lightweight build from ${source_short}"* ]]; then
              reflected=1
              break
            fi
            sleep 20
          done

          if [ "${reflected}" -ne 1 ]; then
            echo "Lite repo did not reflect source ${source_short}. Latest lite message: ${current_lite_msg}"
            echo "Building and pushing the lightweight repo directly from cloud watchdog."

            rm -rf lite-build
            node scripts/build-lite-repo.mjs lite-build

            mkdir -p ~/.ssh
            printf '%s\n' "${LITE_REPO_DEPLOY_KEY}" > ~/.ssh/lite_repo_key
            chmod 600 ~/.ssh/lite_repo_key
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            cd lite-build
            git init
            git config user.name "natsumi-cloud-watchdog"
            git config user.email "actions@github.com"
            git add .
            git commit -m "sync: lightweight build from ${source_short}"
            git branch -M main
            git remote add origin git@github.com:haruki7777/natsumi-bot-24-7.git
            GIT_SSH_COMMAND='ssh -i ~/.ssh/lite_repo_key -o IdentitiesOnly=yes' git push --force origin main
            cd ..

            current_lite_sha="$(gh api repos/haruki7777/natsumi-bot-24-7/commits/main --jq .sha)"
            current_lite_msg="$(gh api repos/haruki7777/natsumi-bot-24-7/commits/main --jq .commit.message)"
            if [[ "${current_lite_msg}" != *"sync: lightweight build from ${source_short}"* ]]; then
              echo "Direct lightweight sync did not reflect source ${source_short}. Latest lite message: ${current_lite_msg}" >&2
              exit 1
            fi
          fi

          echo "source_short=${source_short}" >> "$GITHUB_OUTPUT"
          echo "lite_sha=${current_lite_sha}" >> "$GITHUB_OUTPUT"

      - name: Check Vortexa and apply new lite build
        env:
          VORTEXA_API_KEY: ${{ secrets.VORTEXA_API_KEY }}
          VORTEXA_SERVER_ID: ${{ secrets.VORTEXA_SERVER_ID }}
          LITE_SHA: ${{ steps.lite.outputs.lite_sha }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VORTEXA_API_KEY:-}" ] || [ -z "${VORTEXA_SERVER_ID:-}" ]; then
            echo "Vortexa secrets are not configured; skipping server check."
            exit 0
          fi

          api="https://panel.vortexa.cloud/api/client/servers/${VORTEXA_SERVER_ID}"
          auth=(-H "Authorization: Bearer ${VORTEXA_API_KEY}" -H "Accept: application/json")

          vortexa_get() {
            local url="$1"
            local out=""
            for attempt in 1 2 3 4 5; do
              out="$(curl -fsS --max-time 75 "${auth[@]}" "${url}" 2>/tmp/vortexa-curl-error.log || true)"
              if [ -n "${out}" ]; then
                printf '%s' "${out}"
                return 0
              fi
              echo "Vortexa GET retry ${attempt} failed: $(cat /tmp/vortexa-curl-error.log)"
              sleep 30
            done
            return 1
          }

          vortexa_power() {
            local signal="$1"
            local body status
            body="$(mktemp)"
            printf '{"signal":"%s"}' "${signal}" > "${body}"
            for attempt in 1 2 3 4 5; do
              status="$(curl -sS --max-time 75 -o /tmp/vortexa-power-response.json -w "%{http_code}" \
                -X POST "${auth[@]}" -H "Content-Type: application/json" \
                --data-binary @"${body}" "${api}/power" || true)"
              echo "Vortexa power signal=${signal} attempt=${attempt} status=${status}"
              if [ "${status}" = "204" ]; then
                return 0
              fi
              if [ "${status}" = "504" ]; then
                echo "Vortexa daemon returned 504; will retry before checking logs."
              elif [ "${status}" -ge 400 ] 2>/dev/null; then
                cat /tmp/vortexa-power-response.json || true
              fi
              sleep 30
            done
            return 1
          }

          resources="$(vortexa_get "${api}/resources" || true)"
          state="$(node -e "let s=process.argv[1]||'{}', j={}; for (let i=0; i<5; i++) { try { j=JSON.parse(s); break; } catch { if (s.endsWith('}')) s=s.slice(0,-1); } } console.log(j.attributes?.current_state || 'unknown')" "${resources:-{}}")"
          memory_mb="$(node -e "let s=process.argv[1]||'{}', j={}; for (let i=0; i<5; i++) { try { j=JSON.parse(s); break; } catch { if (s.endsWith('}')) s=s.slice(0,-1); } } console.log(Math.round(((j.attributes?.resources?.memory_bytes||0)/1048576)*10)/10)" "${resources:-{}}")"
          echo "Vortexa state=${state} memory_mb=${memory_mb}"

          last_lite_sha="$(vortexa_get "${api}/files/contents?file=/last-lite-sha.txt" || true)"
          should_power=0
          signal=""

          if [ "${state}" = "offline" ]; then
            should_power=1
            signal="start"
          elif [ "${last_lite_sha}" != "${LITE_SHA}" ]; then
            should_power=1
            signal="restart"
          fi

          if [ "${should_power}" -eq 1 ]; then
            if ! vortexa_power "${signal}"; then
              echo "Vortexa power ${signal} failed after retries; checking logs before failing."
            fi
            sleep 100
          fi

          log="$(vortexa_get "${api}/files/contents?file=/startup.log" || true)"
          echo "${log}" | grep -E "Vortexa auto-update wrapper starting|git fetch --depth 1 origin main|npm install|npm run start:lite|\\[MongoDB\\] Connected\\.|\\[Discord\\] Ready as|\\[Discord\\] Synced|\\[Health\\]" | tail -30 || true

          if echo "${log}" | grep -q "\\[Discord\\] Ready as"; then
            curl -fsS --max-time 45 -X POST "${auth[@]}" -H "Content-Type: text/plain" \
              --data-binary "${LITE_SHA}" "${api}/files/write?file=/last-lite-sha.txt" >/dev/null || true
            echo "Bot Ready signal found."
          else
            echo "No recent Ready signal found in startup.log." >&2
            exit 1
          fi
