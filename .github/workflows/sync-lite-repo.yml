name: Sync lightweight bot repo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sync-lite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build lightweight repo
        run: node scripts/build-lite-repo.mjs lite-build

      - name: Configure SSH
        env:
          LITE_REPO_DEPLOY_KEY: ${{ secrets.LITE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$LITE_REPO_DEPLOY_KEY" > ~/.ssh/lite_repo_key
          chmod 600 ~/.ssh/lite_repo_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push lightweight repo
        run: |
          cd lite-build
          git init
          git config user.name "natsumi-lite-sync"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync: lightweight build from ${GITHUB_SHA::7}"
          git branch -M main
          git remote add origin git@github.com:haruki7777/natsumi-bot-24-7.git
          GIT_SSH_COMMAND='ssh -i ~/.ssh/lite_repo_key -o IdentitiesOnly=yes' git push --force origin main
