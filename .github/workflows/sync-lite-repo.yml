name: Sync lightweight bot repo

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build lightweight repo
        run: |
          set -euo pipefail
          node --check scripts/build-lite-repo.mjs
          rm -rf lite-build
          node scripts/build-lite-repo.mjs lite-build
          test -f lite-build/package.json
          test -f lite-build/bot.ts
          test -d lite-build/commands
          test -d lite-build/events
          test -d lite-build/models
          test -d lite-build/utils
          test -f lite-build/README.md

      - name: Push lightweight repo
        env:
          LITE_REPO_DEPLOY_KEY: ${{ secrets.LITE_REPO_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          source_short="${source_sha:0:7}"

          mkdir -p ~/.ssh
          printf '%s\n' "${LITE_REPO_DEPLOY_KEY}" > ~/.ssh/lite_repo_key
          chmod 600 ~/.ssh/lite_repo_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          cd lite-build
          git init
          git config user.name "natsumi-lite-sync"
          git config user.email "actions@github.com"
          git add .
          git commit -m "sync: lightweight build from ${source_short}"
          git branch -M main
          git remote add origin git@github.com:haruki7777/natsumi-bot-24-7.git
          GIT_SSH_COMMAND='ssh -i ~/.ssh/lite_repo_key -o IdentitiesOnly=yes' git push --force origin main
