name: Sync Lightweight Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout lightweight repository
        uses: actions/checkout@v4
        with:
          repository: haruki7777/natsumi-bot-24-7
          token: ${{ secrets.LITE_REPO_TOKEN }}
          path: light

      - name: Sync files into lightweight repository
        shell: bash
        run: |
          set -euo pipefail

          rsync -a --delete source/ light/ \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "dist" \
            --exclude "build" \
            --exclude "coverage" \
            --exclude "logs" \
            --exclude "*.log" \
            --exclude "package-lock.json" \
            --exclude ".github/workflows/sync-lite.yml"

          cd light

          cat > package.json <<'EOF'
          {
            "name": "natsumi-bot-24-7",
            "version": "1.0.0",
            "description": "Lightweight 24/7 hosting build for Natsumi Discord bot",
            "type": "module",
            "main": "bot.ts",
            "scripts": {
              "start": "tsx bot.ts",
              "start:lite": "tsx bot.ts",
              "start:vortexa": "node scripts/vortexa-start.mjs",
              "check": "node --check bot.ts"
            },
            "dependencies": {
              "@google/genai": "^1.52.0",
              "@google/generative-ai": "^0.24.1",
              "@napi-rs/canvas": "^1.0.0",
              "axios": "^1.15.2",
              "discord-html-transcripts": "^3.1.4",
              "discord.js": "^14.9.0",
              "dotenv": "^16.0.3",
              "mongoose": "^7.0.3",
              "node-fetch": "^2.6.9",
              "tsx": "^4.21.0",
              "typescript": "^6.0.3"
            },
            "engines": {
              "node": ">=20"
            }
          }
          EOF

          git config user.name "natsumi-lite-sync"
          git config user.email "actions@github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No lightweight changes."
            exit 0
          fi

          source_sha="$(cd ../source && git rev-parse --short HEAD)"
          git commit -m "sync: lightweight build from ${source_sha}"
          git push origin main
